name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  ci:
    uses: netresearch/skill-repo-skill/.github/workflows/ci-python.yml@30bf8a094c7fda2e1855cec9c149235bb6fdbfca # main
    permissions:
      contents: read
    with:
      python-versions: '["3.12", "3.13"]'
      test-command: |
        uv python install "$PYTHON_VERSION"
        uv sync --extra dev
        uv run pytest --cov=scripts --cov-report=xml --cov-report=term-missing
      upload-coverage: true
      coverage-files: 'coverage.xml'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
